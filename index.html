<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="logo">▶ media</div>

    <nav>
      <button class="nav-btn active" data-filter="all">All</button>
      <button class="nav-btn" data-filter="video">Videos</button>
      <button class="nav-btn" data-filter="audio">Audios</button>
    </nav>

    <div class="sidebar-section">
      <p class="section-label">Add from URL</p>
      <input id="urlInput" type="text" placeholder="Paste a link…" />
      <input id="titleInput" type="text" placeholder="Title (optional)" />
      <button id="addUrlBtn">Add</button>
    </div>

    <div class="sidebar-section">
      <p class="section-label">Upload file</p>
      <label class="upload-label" for="fileInput">Choose file</label>
      <input id="fileInput" type="file" accept="video/*,audio/*" hidden />
      <span id="fileName">No file chosen</span>
      <button id="addFileBtn">Add</button>
    </div>

    <div class="sidebar-section">
      <button id="clearBtn" class="danger-btn">Clear all</button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main id="main">

    <!-- PLAYER -->
    <section id="playerSection" class="hidden">
      <div id="playerWrap">
        <video id="videoPlayer" controls></video>
        <audio id="audioPlayer" controls></audio>
      </div>
      <div id="nowPlaying">
        <span id="nowTitle"></span>
        <button id="closePlayer">✕</button>
      </div>
    </section>

    <!-- GRID -->
    <section id="gridSection">
      <div id="grid"></div>
      <div id="empty">
        <p>Nothing here yet.</p>
        <p class="sub">Add a URL or upload a file from the sidebar.</p>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
